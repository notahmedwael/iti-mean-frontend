<div class="mt-6 flex items-center justify-between flex-wrap gap-3">
  <!-- Info text -->
  <p class="text-sm text-gray-500">
    Showing
    <span class="font-medium text-gray-700">{{ showingFrom }}–{{ showingTo }}</span>
    of
    <span class="font-medium text-gray-700">{{ totalItems }}</span>
    {{ itemLabel }}
  </p>

  <!-- Buttons -->
  <div class="flex gap-2">
    <!-- Previous -->
    <button
      type="button"
      (click)="go(currentPage - 1)"
      [disabled]="currentPage === 1"
      class="px-4 py-2 bg-white border border-gray-300 rounded-lg text-sm text-gray-700 hover:bg-gray-50 transition-colors disabled:opacity-40 disabled:cursor-not-allowed"
    >
      Previous
    </button>

    <!-- Page numbers -->
    <button
      type="button"
      *ngFor="let page of pageNumbers"
      (click)="go(page)"
      [ngClass]="
        page === currentPage
          ? 'bg-[#602314] text-white border-[#602314] hover:bg-[#4A1A0F]'
          : 'bg-white text-gray-700 border-gray-300 hover:bg-gray-50'
      "
      class="px-4 py-2 border rounded-lg text-sm transition-colors"
    >
      {{ page }}
    </button>

    <!-- Next -->
    <button
      type="button"
      (click)="go(currentPage + 1)"
      [disabled]="currentPage === totalPages"
      class="px-4 py-2 bg-white border border-gray-300 rounded-lg text-sm text-gray-700 hover:bg-gray-50 transition-colors disabled:opacity-40 disabled:cursor-not-allowed"
    >
      Next
    </button>
  </div>
</div>
