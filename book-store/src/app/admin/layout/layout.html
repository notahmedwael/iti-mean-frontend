<div class="flex min-h-screen bg-[#FAF6F0]" style="

      -apple-system,

      <a routerLink="/dashboard" routerLinkActive="sidebar-active"

        <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" stroke-width="1.75" viewBox="0 0 24 24">
          <rect x="3" y="3" width="7" height="7" rx="1" />
          <rect x="14" y="3" width="7" height="7" rx="1" />

      <a routerLink="/admin/books" routerLinkActive="sidebar-active"
        class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-lg text-white/75 hover:bg-white/10 transition-colors duration-200">
        <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" stroke-width="1.75" viewBox="0 0 24 24">

      <a routerLink="/orders" routerLinkActive="sidebar-active"
        class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-lg text-white/75 hover:bg-white/10 transition-colors duration-200">
        <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" stroke-width="1.75" viewBox="0 0 24 24">
