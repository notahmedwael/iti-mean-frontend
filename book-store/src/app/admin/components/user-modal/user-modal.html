<div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm">
  <div
    class="bg-white rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden border border-gray-100 animate-in fade-in zoom-in duration-200"
  >
    <div class="bg-maroon p-6 text-white flex justify-between items-center">
      <h2 class="text-xl font-black">
        {{ mode === 'add' ? 'Add New User' : 'Edit User Profile' }}
      </h2>
      <button (click)="close.emit()" class="text-white/80 hover:text-white transition-colors">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M6 18L18 6M6 6l12 12"
          ></path>
        </svg>
      </button>
    </div>

    <form [formGroup]="userForm" (ngSubmit)="onSubmit()" class="p-8 space-y-4">
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-xs font-bold text-gray-500 uppercase mb-1">First Name</label>
          <input
            formControlName="firstName"
            class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-rust outline-none"
            [class.border-red-500]="
              userForm.get('firstName')?.touched && userForm.get('firstName')?.invalid
            "
          />
        </div>
        <div>
          <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Last Name</label>
          <input
            formControlName="lastName"
            class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-rust outline-none"
            [class.border-red-500]="
              userForm.get('lastName')?.touched && userForm.get('lastName')?.invalid
            "
          />
        </div>
      </div>

      <div>
        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Email Address</label>
        <input
          type="email"
          formControlName="email"
          class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-rust outline-none"
        />
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Role</label>
          <select
            formControlName="role"
            class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-rust outline-none bg-white"
          >
            <option value="User">User (Customer)</option>
            <option value="Admin">Administrator</option>
          </select>
        </div>
        <div>
          <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Birthday</label>
          <input
            type="date"
            formControlName="dob"
            class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-rust outline-none"
          />
        </div>
      </div>

      <div *ngIf="mode === 'add'">
        <label class="block text-xs font-bold text-gray-500 uppercase mb-1"
          >Temporary Password</label
        >
        <input
          type="password"
          formControlName="password"
          class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-rust outline-none"
          placeholder="••••••••"
        />
      </div>

      <div class="flex gap-3 pt-4">
        <button
          type="button"
          (click)="close.emit()"
          class="flex-1 px-6 py-3 border border-gray-300 text-gray-700 font-bold rounded-xl hover:bg-gray-50 transition"
        >
          Cancel
        </button>
        <button
          type="submit"
          class="flex-1 px-6 py-3 bg-rust text-white font-bold rounded-xl hover:bg-opacity-90 shadow-lg shadow-rust/20 transition"
        >
          {{ mode === 'add' ? 'Create User' : 'Save Changes' }}
        </button>
      </div>
    </form>
  </div>
</div>
