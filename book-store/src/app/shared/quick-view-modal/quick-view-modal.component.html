<div class="fixed inset-0 z-50 flex items-center justify-center p-4">
  <!-- Backdrop -->
  <div
    [@fadeInBackdrop]
    (click)="onClose()"
    class="fixed inset-0 bg-[#2A1208]/40 backdrop-blur-sm z-40"
  ></div>

  <!-- Modal -->
  <div
    [@fadeInModal]
    class="relative bg-white rounded-2xl shadow-2xl max-w-4xl w-full max-h-[90vh] overflow-hidden
           grid grid-cols-1 md:grid-cols-[1fr_1.5fr] z-50"
  >
    <!-- Left: Book Cover -->
    <div class="hidden md:flex items-center justify-center bg-gradient-to-b from-[#FAF6F0] to-[#F0E8DC] p-8">
      <div class="aspect-[2/3] w-full relative">
        <img
          [src]="book.cover"
          [alt]="book.name"
          class="w-full h-full object-cover rounded-lg shadow-lg"
        />
        @if (false) {
          <div
            class="absolute -bottom-4 -right-4 w-20 h-20 rounded-full bg-[#DD9047] text-white
                   flex flex-col items-center justify-center font-bold shadow-lg"
          >
            <div class="text-2xl">🏆</div>
            <div class="text-xs text-center"></div>
          </div>
        }
      </div>
    </div>

    <!-- Right: Details -->
    <div class="p-8 flex flex-col overflow-y-auto">
      <!-- Close Button -->
      <button
        (click)="onClose()"
        class="absolute top-4 right-4 p-2 text-[#8A7260] hover:text-[#602314] transition"
      >
        <svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <path d="M18 6L6 18M6 6l12 12" stroke-width="2" stroke-linecap="round" />
        </svg>
      </button>

      <!-- Title & Meta -->
      <h2 class="text-2xl font-black text-[#602314] mb-2">{{ book.name }}</h2>
      <p class="text-[#8A7260] mb-4">by {{ book.author.name }}</p>

      <!-- Rating -->
      <div class="mb-4">
        <app-star-rating [rating]="3.5" [reviews]="0"></app-star-rating>
      </div>

      <!-- Category -->
      <div class="flex gap-4 mb-6 text-sm">
        @if (book.category) {
          <div>
            <span class="text-[#8A7260]">Category:</span>
            <span class="font-semibold text-[#BC552A]">{{ book.category.name }}</span>
          </div>
        }
      </div>

      <!-- Price -->
      <div class="mb-6 pb-6 border-b border-[#602314]/10">
        <div class="text-4xl font-black text-[#602314]">${{ book.price.toFixed(2) }}</div>
      </div>

      <!-- Description -->
      @if (false) {
        <div class="mb-6">
          <h3 class="font-bold text-[#602314] mb-2">About this book</h3>
          <p class="text-sm text-[#7A5C4A] leading-relaxed"></p>
        </div>
      }

      <!-- Quantity Selector -->
      <div class="mb-6">
        <label class="text-sm font-semibold text-[#602314] block mb-2">Quantity</label>
        <div class="flex items-center gap-3">
          <button
            (click)="decreaseQuantity()"
            class="w-10 h-10 rounded-lg border border-[#602314]/20 text-[#602314]
                   hover:bg-[#FAF6F0] transition"
          >
            −
          </button>
          <input
            type="number"
            [(ngModel)]="quantity"
            [min]="1"
            class="w-16 h-10 text-center border border-[#602314]/20 rounded-lg text-[#602314]"
          />
          <button
            (click)="increaseQuantity()"
            class="w-10 h-10 rounded-lg border border-[#602314]/20 text-[#602314]
                   hover:bg-[#FAF6F0] transition"
          >
            +
          </button>
        </div>
      </div>

      <!-- Actions -->
      <div class="flex gap-3 mt-auto">
        <button
          (click)="addToCart()"
          class="flex-1 py-3 bg-[#BC552A] text-white font-bold rounded-xl
                 hover:bg-[#A04820] transition-colors"
        >
          Add to Cart
        </button>
        <button
          (click)="toggleWishlist()"
          [class]="
            'px-4 py-3 rounded-xl font-bold transition-all ' +
            (isWishlisted()
              ? 'bg-[#BC552A] text-white'
              : 'bg-[#FAF6F0] text-[#BC552A] hover:bg-[#F0E8DC]')
          "
        >
          ❤️
        </button>
      </div>
    </div>
  </div>
</div>
