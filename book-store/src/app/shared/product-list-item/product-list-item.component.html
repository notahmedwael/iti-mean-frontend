<div
  class="group bg-white rounded-xl border border-[#602314]/10
           hover:shadow-lg hover:border-[#602314]/20
           transition-all duration-300 p-4 flex gap-4"
>
  <!-- Image -->
  <div class="flex-shrink-0 relative">
    <div class="w-20 sm:w-24 aspect-[2/3] rounded-lg overflow-hidden bg-gradient-to-b from-[#FAF6F0] to-[#F0E8DC]">
      <img
        [src]="book.cover"
        [alt]="book.name"
        class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300"
      />
    </div>
    <!-- Badge -->
    @if (false) {
      <div
        class="absolute top-1 right-1 w-8 h-8 rounded-full bg-[#DD9047] text-white
               flex items-center justify-center text-xs font-bold"
      >
        ★
      </div>
    }
  </div>

  <!-- Content -->
  <div class="flex-1 min-w-0">
    <h3 class="font-bold text-[#602314] text-sm mb-1 line-clamp-1">
      {{ book.name }}
    </h3>
    <p class="text-xs text-[#8A7260] mb-2">{{ book.author.name }}</p>
    <p class="text-xs text-[#7A5C4A] line-clamp-2 mb-3">
      {{ book.category.name }}
    </p>
    <app-star-rating [rating]="3.5" [reviews]="0"></app-star-rating>
  </div>

  <!-- Price & Actions -->
  <div class="flex flex-col items-end justify-between flex-shrink-0">
    <div class="text-right">
      <div class="text-lg font-black text-[#602314]">{{ formatPrice(book.price) }}</div>
    </div>

    <div class="flex gap-2">
      <button
        (click)="onQuickView()"
        class="p-2 rounded-full bg-[#FAF6F0] text-[#602314] 
               hover:bg-[#BC552A] hover:text-white transition-colors"
      >
        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor">
          <path
            d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"
          />
        </svg>
      </button>
      <button
        (click)="addToCart()"
        class="px-3 py-2 bg-[#BC552A] text-white text-xs font-bold rounded-lg
               hover:bg-[#A04820] transition-colors"
      >
        Add
      </button>
    </div>
  </div>
</div>
