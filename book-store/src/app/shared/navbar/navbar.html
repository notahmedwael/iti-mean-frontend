<div class="bg-maroon text-cream text-center text-sm py-2 font-medium tracking-wide">
  📚 Free shipping on orders over <strong class="text-white">$35</strong> — Use code
  <strong class="text-gold">BOOKWORM</strong>
</div>

<header class="bg-cream border-b border-gray-200">
  <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
    <div class="flex items-center space-x-8">
      <a routerLink="/" class="text-2xl font-black text-maroon flex items-center gap-2">
        <span class="bg-rust text-white p-1 rounded">📖</span> Folio&Co
      </a>
      <nav class="hidden md:flex space-x-6 text-maroon font-medium text-sm">
        <a routerLink="/books" class="hover:text-rust transition">Browse</a>
        <a href="#" class="hover:text-rust transition">New Arrivals</a>
        <a href="#" class="hover:text-rust transition">Best Sellers</a>
      </nav>
    </div>

    <div class="flex items-center space-x-5">
      <div class="hidden lg:flex border border-gray-300 rounded-full overflow-hidden bg-white">
        <input
          type="text"
          placeholder="Search books..."
          class="px-4 py-2 outline-none w-64 text-sm text-maroon"
        />
        <button
          class="bg-rust text-white px-5 py-2 text-sm font-semibold hover:bg-rust-dark transition"
        >
          Search
        </button>
      </div>

      <!-- Wishlist Button -->
      <button
        class="relative p-2 text-maroon hover:text-rust transition rounded-full hover:bg-gray-100"
        title="Wishlist"
      >
        <svg class="w-6 h-6" viewBox="0 0 24 24" fill="currentColor">
          <path
            d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"
          />
        </svg>
        @if ((getWishlistCount() | async)?.length) {
          <span
            class="absolute -top-1 -right-1 bg-rust text-white text-xs font-bold rounded-full w-5 h-5 flex items-center justify-center"
          >
            {{ (getWishlistCount() | async)?.length }}
          </span>
        }
      </button>

      <!-- Cart Button -->
      <button
        class="relative p-2 text-maroon hover:text-rust transition rounded-full hover:bg-gray-100"
        title="Shopping Cart"
      >
        <svg class="w-6 h-6" viewBox="0 0 24 24" fill="currentColor">
          <path
            d="M9 2C8.45 2 8 2.45 8 3V4H4C2.9 4 2 4.9 2 6V7C2 8.1 2.9 9 4 9H5L6 20C6.05 20.85 6.73 21.5 7.6 21.5H16.4C17.27 21.5 17.95 20.85 18 20L19 9H20C21.1 9 22 8.1 22 7V6C22 4.9 21.1 4 20 4H16V3C16 2.45 15.55 2 15 2H9M9 4H15V3H9V4M6 9H18L17 20H7L6 9M9 11C8.45 11 8 11.45 8 12V18C8 18.55 8.45 19 9 19C9.55 19 10 18.55 10 18V12C10 11.45 9.55 11 9 11M12 11C11.45 11 11 11.45 11 12V18C11 18.55 11.45 19 12 19C12.55 19 13 18.55 13 18V12C13 11.45 12.55 11 12 11M15 11C14.45 11 14 11.45 14 12V18C14 18.55 14.45 19 15 19C15.55 19 16 18.55 16 18V12C16 11.45 15.55 11 15 11Z"
          />
        </svg>
        @if (getCartCount() > 0) {
          <span
            class="absolute -top-1 -right-1 bg-rust text-white text-xs font-bold rounded-full w-5 h-5 flex items-center justify-center"
          >
            {{ getCartCount() }}
          </span>
        }
      </button>

      @if (authService.isLoggedIn$ | async) {
        <button
          (click)="logout()"
          class="bg-maroon text-white px-6 py-2 rounded-full font-semibold text-sm hover:bg-opacity-90 transition cursor-pointer"
        >
          Logout
        </button>
      } @else {
        <a
          routerLink="/login"
          class="bg-maroon text-white px-6 py-2 rounded-full font-semibold text-sm hover:bg-opacity-90 transition"
        >
          Sign In
        </a>
      }
    </div>
  </div>
</header>
